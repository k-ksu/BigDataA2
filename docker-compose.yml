version: "3.8"

services:
  # Spark Master / Hadoop all-in-one node
  # Runs app.sh automatically on startup (start services → index → search)
  cluster-master:
    image: firasj/spark-docker-cluster
    container_name: cluster-master
    ports:
      - "8088:8088"
      - "4040:4040"
      - "19888:19888"
    networks:
      - spark-cluster
    tty: true
    working_dir: /app
    volumes:
      - ./app:/app
    hostname: cluster-master
    entrypoint:
      - bash
      - /app/app.sh

  # Spark Worker / Slave node
  cluster-slave-1:
    image: firasj/spark-docker-cluster
    container_name: cluster-slave-1
    networks:
      - spark-cluster
    depends_on:
      - cluster-master
    hostname: cluster-slave-1
    tty: true

  # Cassandra — stores the inverted index, vocabulary and document statistics
  cassandra-server:
    image: cassandra
    container_name: cassandra-server
    ports:
      - "7000:7000"
    networks:
      - spark-cluster

networks:
  spark-cluster:
    driver: bridge
